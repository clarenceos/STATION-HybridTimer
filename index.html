<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0F">
<title>STATION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D0D0F; --surface:#141417; --surface2:#1A1A1F;
  --border:#252528; --border2:#1a1a1e;
  --neon:#00E87A; --orange:#FF5722;
  --text:#F0F0F0; --text2:#888888; --text3:#444444; --text4:#2e2e32;
  --danger:#cc3300; --neon-dim:#00E87A40;
}
body.light-mode {
  --bg:#F5F5F7; --surface:#FFFFFF; --surface2:#EBEBED;
  --border:#DDDDE0; --text:#111111; --text2:#555555; --text3:#999999;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;line-height:1.4}
.screen{position:fixed;inset:0;background:var(--bg);overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column}
.screen.active{display:flex}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit;min-height:48px;min-width:48px;display:inline-flex;align-items:center;justify-content:center;transition:transform .1s}
button:active{transform:scale(0.97)}
input,textarea,select{font-family:'Barlow',sans-serif;font-size:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--neon)}
textarea{resize:vertical;min-height:80px}
.btn{display:flex;align-items:center;justify-content:center;padding:0 20px;height:56px;border-radius:32px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;border:none;transition:transform .1s}
.btn:active{transform:scale(0.97)}
.btn-neon{background:var(--neon);color:#0D0D0F}
.btn-orange{background:var(--orange);color:#fff}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-full{width:100%}
.btn-lg{height:64px;font-size:18px}
.header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border2);flex-shrink:0}
.header-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase;flex:1}
.back-btn{width:44px;height:44px;border-radius:12px;background:var(--surface2);color:var(--text);font-size:20px;flex-shrink:0}
.screen-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.pill-tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.tag-cardio{background:#FF572220;color:var(--orange)}
.tag-kettlebell{background:#00E87A20;color:var(--neon)}
.tag-dumbbell{background:#4FC3F720;color:#4FC3F7}
.tag-barbell{background:#AB47BC20;color:#AB47BC}
.tag-medicine_ball{background:#FF980020;color:#FF9800}
.tag-sandbag{background:#8D6E6320;color:#8D6E63}
.tag-bodyweight{background:#78909C20;color:#78909C}
.modal-overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:calc(100% - 40px);max-width:480px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.04em;text-transform:uppercase}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.sheet-overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s}
.sheet-overlay.visible{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;padding:20px;max-height:80vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
.sheet-overlay.visible .sheet{transform:translateY(0)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--surface);border-left:3px solid var(--neon);color:var(--text);padding:12px 18px;border-radius:10px;font-family:'Barlow',sans-serif;font-weight:500;font-size:14px;white-space:nowrap;animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.countdown-overlay{position:fixed;inset:0;background:var(--bg);z-index:150;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;opacity:0;pointer-events:none;transition:opacity .15s}
.countdown-overlay.visible{opacity:1;pointer-events:all}
.countdown-num{font-family:'Fugaz One',sans-serif;font-size:160px;color:var(--neon);line-height:1;animation:countScale .1s ease}
@keyframes countScale{from{transform:scale(1.2)}to{transform:scale(1)}}
.countdown-go{font-family:'Fugaz One',sans-serif;font-size:80px;color:var(--neon)}
</style>
</head>
<body>

<div id="screen-home" class="screen active"></div>
<div id="screen-exercise-builder" class="screen"></div>
<div id="screen-wod-builder" class="screen"></div>
<div id="screen-wod-library" class="screen"></div>
<div id="screen-timer" class="screen"></div>
<div id="screen-summary" class="screen"></div>
<div id="screen-journal" class="screen"></div>
<div id="screen-history" class="screen"></div>
<div id="screen-settings" class="screen"></div>
<div id="modal-overlay" class="modal-overlay"><div id="modal" class="modal"></div></div>
<div id="sheet-overlay" class="sheet-overlay"><div id="sheet" class="sheet"></div></div>
<div id="countdown-overlay" class="countdown-overlay"><div id="countdown-num" class="countdown-num"></div></div>
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
<script>
'use strict';
// ── UTILS ──────────────────────────────────────────────────────────────────
const uid = () => crypto.randomUUID();
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const fmtMM = s => { s=Math.floor(s); const m=Math.floor(s/60),sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; };
const fmtFull = s => { s=Math.floor(s); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return h>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:fmtMM(s); };
const fmtDate = ts => new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
const todayStr = () => new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.getElementById('toast-container').appendChild(el); setTimeout(()=>el.remove(),2500); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DB ─────────────────────────────────────────────────────────────────────
let db;
async function initDB(){
  db = await idb.openDB('station-db',1,{
    upgrade(d){
      ['exercises','complexes','wods','sessions','settings'].forEach(s=>{
        if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'});
      });
    }
  });
}
const DB={
  get:(s,id)=>db.get(s,id),
  all:(s)=>db.getAll(s),
  put:(s,v)=>db.put(s,v),
  del:(s,id)=>db.delete(s,id),
  clear:(s)=>db.clear(s),
};

// ── STATE ──────────────────────────────────────────────────────────────────
const S={
  settings:{darkMode:true,countdownDuration:3,voiceMode:'female'},
  exFilter:'all', exTab:'exercises',
  wodBuilder:{stations:[],name:'',id:null,isNew:true},
  timer:{active:false,paused:false,startMs:0,totalPausedMs:0,pauseStartMs:0,
    stationIdx:0,stationStartMs:0,laps:[],canUndo:false,undoBackup:null,
    wakeLock:null,rafId:null,sessionId:null,wod:null,stations:[],exercises:[],complexes:[]},
  summaryId:null, journalId:null,
};

// ── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx=null;
function getACtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq=880,dur=0.15,vol=0.7){
  try{
    const ctx=getACtx(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=freq; osc.type='sine';
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(); osc.stop(ctx.currentTime+dur);
  }catch(e){}
}

// ── VOICE ──────────────────────────────────────────────────────────────────
let voices=[];
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>{ voices=speechSynthesis.getVoices(); };
function speak(text){
  if(!window.speechSynthesis||S.settings.voiceMode==='none') return;
  const utt=new SpeechSynthesisUtterance(text);
  const mode=S.settings.voiceMode;
  const fNames=['samantha','karen','victoria','moira','fiona','female','zira','susan'];
  const mNames=['daniel','alex','tom','fred','male','david','mark','jorge'];
  const names=mode==='female'?fNames:mNames;
  const v=voices.find(v=>names.some(n=>v.name.toLowerCase().includes(n)));
  if(v) utt.voice=v;
  utt.rate=1.1;
  speechSynthesis.speak(utt);
}

// ── WAKE LOCK ──────────────────────────────────────────────────────────────
async function reqWakeLock(){ try{ if('wakeLock'in navigator) S.timer.wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
function relWakeLock(){ S.timer.wakeLock?.release?.(); S.timer.wakeLock=null; }

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id)?.classList.add('active');
}
async function nav(screen,opts={}){
  switch(screen){
    case 'home': await renderHome(); break;
    case 'exercise-builder': await renderExBuilder(); break;
    case 'wod-builder': await renderWodBuilder(opts); break;
    case 'wod-library': await renderWodLibrary(); break;
    case 'summary': await renderSummary(opts.sessionId); break;
    case 'journal': await renderJournal(opts.sessionId); break;
    case 'history': await renderHistory(); break;
    case 'settings': await renderSettings(); break;
  }
  showScreen(screen);
}

// ── MODALS / SHEETS ────────────────────────────────────────────────────────
function showModal(html){ const o=document.getElementById('modal-overlay'); document.getElementById('modal').innerHTML=html; o.classList.add('visible'); }
function hideModal(){ document.getElementById('modal-overlay').classList.remove('visible'); }
function showSheet(html){ const o=document.getElementById('sheet-overlay'); document.getElementById('sheet').innerHTML=html; o.classList.add('visible'); }
function hideSheet(){ document.getElementById('sheet-overlay').classList.remove('visible'); }
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal(); });
document.getElementById('sheet-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideSheet(); });

// ── SEED DATA ──────────────────────────────────────────────────────────────
const EQ_NAMES={cardio:'Cardio',kettlebell:'Kettlebell',dumbbell:'Dumbbell',barbell:'Barbell',medicine_ball:'Medicine Ball',sandbag:'Sandbag',bodyweight:'Bodyweight'};
const SEED_EX_MAP={
  cardio:['Run','Row','SkiErg','Bike Erg','Sled Push','Sled Pull'],
  kettlebell:['Goblet Squat','Lunge','Rack Squat','Deadlift','Single-Leg Deadlift','Swing','Floor Press','Press','Renegade Row','Row','Clean','Clean & Press','Snatch','Turkish Get-Up','Around the Body Pass','Figure 8','Halo','Windmill','Farmers Carry','Suitcase Carry'],
  dumbbell:['Bulgarian Split Squat','Goblet Squat','Lunge','Step-Up','Deadlift','Romanian Deadlift','Bench Press','Fly','Front Raise','Lateral Raise','Shoulder Press','Skull Crusher','Tricep Kickback','Bicep Curl','Hammer Curl','Rear Delt Fly','Renegade Row','Row','Shrug','Clean','Snatch','Farmers Carry'],
  barbell:['Back Squat','Front Squat','Lunge','Overhead Squat','Zercher Squat','Conventional Deadlift','Good Morning','Hip Thrust','Romanian Deadlift','Sumo Deadlift','Bench Press','Overhead Press','Push Press','Bent-Over Row','Pendlay Row','Upright Row','Clean & Jerk','Hang Clean','Power Clean','Snatch','Farmers Carry','Deadlift'],
  medicine_ball:['Single-Leg Deadlift','Chest Pass','Push-Up','Lunge with Twist','Squat & Press','Plank Pass','Russian Twist','Sit-Up Pass','V-Up Pass','Hip Toss','Lateral Toss','Rotational Throw','Woodchop','Overhead Throw','Slam','Squat Jump','Wall Ball'],
  sandbag:['Bear Hug Squat','Lunge','Squat','Step-Up','Zercher Squat','Deadlift','Press','Row','Clean','Get-Up','Shouldering','Rotational Throw','Slam','Toss','Bear Hug Carry','Carry','Drag'],
  bodyweight:['Bulgarian Split Squat','Lunge','Squat','Step-Up','Glute Bridge','Hip Thrust','Nordic Curl','Dip','Handstand Push-Up','Pike Push-Up','Push-Up','Chin-Up','Inverted Row','Pull-Up','Burpee','Burpee Broad Jump','Muscle-Up','Hollow Body Hold','L-Sit','Plank','Side Plank','Mountain Climber','Box Jump','Broad Jump','Jump Squat'],
};
const SPECIAL={
  'cardio:Run':'pb-run','cardio:Row':'pb-row','cardio:SkiErg':'pb-skierg','cardio:Bike Erg':'pb-bikeerg',
  'cardio:Sled Push':'pb-sledpush','cardio:Sled Pull':'pb-sledpull',
  'kettlebell:Swing':'pb-kb-swing','kettlebell:Farmers Carry':'pb-kb-fc','kettlebell:Lunge':'pb-kb-lunge',
  'barbell:Deadlift':'pb-bb-dl',
  'medicine_ball:Wall Ball':'pb-mb-wb',
  'sandbag:Lunge':'pb-sb-lunge',
  'bodyweight:Burpee':'pb-bw-burpee','bodyweight:Burpee Broad Jump':'pb-bw-bbj',
};
function getExId(eq,name){ return SPECIAL[`${eq}:${name}`]||`pb-${eq.replace('_','-')}-${slug(name)}`; }

async function seedData(){
  const existing=await DB.all('exercises');
  if(existing.length>0) return;
  const exList=[];
  for(const [eq,names] of Object.entries(SEED_EX_MAP)){
    for(const name of names){
      exList.push({id:getExId(eq,name),name,equipment:eq,defaultWeight:null,defaultReps:null,defaultDistance:eq==='cardio'?1000:null,notes:'',isPrebuilt:true,isComplex:false});
    }
  }
  for(const ex of exList) await DB.put('exercises',ex);

  // Prebuilt WODs
  const mk=(type,exKey,dist,weight,reps,unit,notes='')=>({
    id:uid(),type,exerciseId:exKey?getExId(...exKey.split(':').reduce((a,v,i)=>i===0?[v,a[1]]:[a[0],v],[])):'',
    complexId:null,weight:weight||null,reps:reps||null,distance:dist||null,time:null,unit:unit||'reps',notes
  });
  // helper to make station
  const st=(type,eq,name,opts={})=>({
    id:uid(),type,
    exerciseId:type!=='complex'?getExId(eq,name):null,
    complexId:null,
    weight:opts.w||null,reps:opts.r||null,distance:opts.d||null,time:null,
    unit:opts.u||'reps',notes:opts.n||''
  });

  const wodFull={id:'pb-wod-hyrox-full',name:'Full Hyrox Sim',isPrebuilt:true,createdAt:Date.now(),stations:[
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','cardio','SkiErg',{d:1000,u:'meters'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','cardio','Sled Push',{d:50,u:'meters',n:'Add appropriate weight'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','cardio','Sled Pull',{d:50,u:'meters',n:'Add appropriate weight'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','bodyweight','Burpee Broad Jump',{d:80,u:'meters',n:'Burpee then broad jump, repeat'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','cardio','Row',{d:1000,u:'meters'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','kettlebell','Farmers Carry',{d:200,u:'meters',n:'24kg/hand RX men, 16kg/hand RX women'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','sandbag','Lunge',{d:100,u:'meters',n:'20kg RX men, 10kg RX women'}),
    st('cardio','cardio','Run',{d:1000}),
    st('exercise','medicine_ball','Wall Ball',{r:100,u:'reps',n:'6kg RX men, 4kg RX women, 9m target'}),
  ]};
  const wodShort={id:'pb-wod-hyrox-short',name:'Short Hyrox Sim',isPrebuilt:true,createdAt:Date.now(),stations:[
    st('cardio','cardio','Run',{d:500}),
    st('exercise','cardio','SkiErg',{d:500,u:'meters'}),
    st('cardio','cardio','Run',{d:500}),
    st('exercise','cardio','Sled Push',{d:25,u:'meters',n:'Add appropriate weight'}),
    st('cardio','cardio','Run',{d:500}),
    st('exercise','cardio','Row',{d:500,u:'meters'}),
    st('cardio','cardio','Run',{d:500}),
    st('exercise','kettlebell','Farmers Carry',{d:100,u:'meters',n:'24kg/hand RX men, 16kg/hand RX women'}),
    st('cardio','cardio','Run',{d:500}),
    st('exercise','medicine_ball','Wall Ball',{r:50,u:'reps',n:'6kg RX men, 4kg RX women'}),
  ]};
  const wod270={id:'pb-wod-270-ladder',name:'270m KB Ladder',isPrebuilt:true,createdAt:Date.now(),stations:[
    st('cardio','cardio','Run',{d:270}),
    st('exercise','barbell','Deadlift',{w:60,r:8,u:'reps'}),
    st('cardio','cardio','Run',{d:270}),
    st('exercise','medicine_ball','Wall Ball',{w:7,r:10,u:'reps'}),
    st('cardio','cardio','Run',{d:270}),
    st('exercise','kettlebell','Swing',{w:18,r:15,u:'reps'}),
    st('cardio','cardio','Run',{d:270}),
    st('exercise','kettlebell','Lunge',{w:12,r:10,u:'reps',n:'each leg'}),
    st('cardio','cardio','Run',{d:270}),
    st('exercise','kettlebell','Farmers Carry',{w:12,d:270,u:'meters',n:'12kg + 9kg, switch hands as needed'}),
  ]};
  for(const w of [wodFull,wodShort,wod270]) await DB.put('wods',w);

  // Default settings
  await DB.put('settings',{id:'user-settings',darkMode:true,countdownDuration:3,voiceMode:'female'});
}

// ── STATION LABEL HELPER ───────────────────────────────────────────────────
function stationLabel(st,exercises,complexes){
  const ex=exercises.find(e=>e.id===st.exerciseId);
  if(st.type==='cardio'||st.type==='exercise'){
    if(!ex) return 'Station';
    if(st.type==='cardio') return `${ex.name.toUpperCase()} · ${st.distance||'?'}m`;
    let spec='';
    if(st.unit==='reps'){ if(st.weight) spec=`${st.weight}kg · `; spec+=`${st.reps||'?'} reps`; }
    else if(st.unit==='meters') spec=`${st.distance||'?'}m`;
    else if(st.unit==='seconds') spec=`${st.time||'?'}s`;
    return spec?`${ex.name} · ${spec}`:ex.name;
  }
  if(st.type==='complex'){
    const cx=complexes.find(c=>c.id===st.complexId);
    return cx?`${cx.name} × ${st.reps||1} rounds`:complexes;
  }
  return 'Station';
}

// ── TAG HELPER ─────────────────────────────────────────────────────────────
function eqTag(eq){ return `<span class="pill-tag tag-${eq}">${EQ_NAMES[eq]||eq}</span>`; }

// ── HOME SCREEN ────────────────────────────────────────────────────────────
async function renderHome(){
  const sessions=await DB.all('sessions');
  sessions.sort((a,b)=>b.startedAt-a.startedAt);
  const recent=sessions.slice(0,3);
  let sessionCards='';
  if(recent.length===0){
    sessionCards=`<div style="text-align:center;color:var(--text3);padding:24px 0;font-size:14px">No sessions yet. Build your first WOD.</div>`;
  } else {
    sessionCards=recent.map(sess=>`
      <div class="card" style="cursor:pointer;flex-shrink:0;min-width:180px;position:relative" onclick="nav('summary',{sessionId:'${sess.id}'})">
        ${sess.journalPending?`<div style="position:absolute;top:10px;right:10px;background:var(--orange);color:#fff;padding:2px 7px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:.04em">PENDING</div>`:''}
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:.04em;text-transform:uppercase;padding-right:${sess.journalPending?'60px':'0'}">${esc(sess.wodName)}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">${fmtDate(sess.startedAt)}</div>
        <div style="font-family:'Fugaz One',sans-serif;color:var(--neon);font-size:18px;margin-top:6px">${fmtFull(sess.totalDuration)}</div>
      </div>`).join('');
  }
  document.getElementById('screen-home').innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;padding:24px 20px 32px;gap:20px;max-width:560px;margin:0 auto;width:100%">
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-ghost" style="width:48px;height:48px;border-radius:12px;font-size:22px" onclick="nav('settings')">⚙</button></div>
      <div style="text-align:center;padding:16px 0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:64px;letter-spacing:.04em;text-transform:uppercase;color:var(--neon);line-height:1">STATION</div>

function addCxMovement(){
  const container=document.getElementById('cx-movements');
  const i=container.children.length;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:8px;align-items:center';
  div.innerHTML=`<input inputmode="numeric" style="width:60px;flex-shrink:0" placeholder="Reps" value="1" id="cx-m-reps-${i}">
    <input style="flex:1" placeholder="Exercise name" id="cx-m-ex-${i}">
    <button onclick="this.parentElement.remove()" style="color:var(--danger);background:var(--surface2);border:none;width:36px;height:36px;border-radius:8px">✕</button>`;
  container.appendChild(div);
}

async function saveComplex(existingId){
  const name=document.getElementById('cx-name').value.trim();
  if(!name){ alert('Name required'); return; }
  const movements=[];
  const container=document.getElementById('cx-movements');
  const exercises=await DB.all('exercises');
  for(const row of container.children){
    const repsInput=row.querySelector('input[inputmode]');
    const exInput=row.querySelectorAll('input')[1];
    if(!repsInput||!exInput) continue;
    const reps=parseInt(repsInput.value)||1;
    const exVal=exInput.value.trim();
    const found=exercises.find(e=>e.name.toLowerCase()===exVal.toLowerCase()||e.id===exVal);
    if(found) movements.push({exerciseId:found.id,reps});
  }
  if(movements.length<2){ alert('Add at least 2 movements'); return; }
  const cx={id:existingId||uid(),name,equipment:document.getElementById('cx-eq').value,movements,isPrebuilt:false};
  await DB.put('complexes',cx);
  hideModal(); toast('Complex saved'); await renderCxList();
}

async function deleteComplex(id){
  const cx=await DB.get('complexes',id);
  showModal(`<h2>Delete Complex?</h2><p style="color:var(--text2)">"${esc(cx?.name)}"</p>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1" onclick="confirmDeleteCx('${id}')">Delete</button>
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>

}

function renderStationList(exercises,complexes){
  const list=document.getElementById('station-list');
  if(!list) return;
  const wb=S.wodBuilder;
  if(wb.stations.length===0){
    list.innerHTML=`<div style="text-align:center;color:var(--text3);padding:24px 0;font-size:14px">No stations yet. Add one below.</div>`;
    return;
  }
  list.innerHTML=wb.stations.map((st,i)=>{
    const label=stationLabel(st,exercises,complexes);
    const isExpanded=st._expanded;
    return `
      <div class="station-row" id="station-row-${i}" draggable="true" style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden"
        ondragstart="dragStart(${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})" ondragend="dragEnd()">
        <div style="display:flex;align-items:center;min-height:56px;cursor:pointer" onclick="toggleStation(${i})">
          <div style="width:48px;height:56px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px;cursor:grab;flex-shrink:0" draggable="false">≡</div>
          <div style="width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:var(--text3);flex-shrink:0">${i+1}</div>
          <div style="flex:1;padding:0 12px;min-width:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(label)}</div>
          </div>
          <button onclick="event.stopPropagation();duplicateStation(${i})" style="width:40px;height:56px;color:var(--text3);font-size:16px;background:none;border:none;flex-shrink:0">⧉</button>
          <button onclick="event.stopPropagation();deleteStation(${i})" style="width:44px;height:56px;color:var(--danger);font-size:18px;background:none;border:none;flex-shrink:0">✕</button>
        </div>
        ${isExpanded?renderStationEditor(st,i,exercises,complexes):''}
      </div>`;
  }).join('');
}

function renderStationEditor(st,i,exercises,complexes){
  const ex=exercises.find(e=>e.id===st.exerciseId);
  if(st.type==='cardio'){
    return `<div style="padding:12px 16px 16px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:10px">
      <div><label style="font-size:12px;color:var(--text2)">Distance (m)</label>
        <input inputmode="numeric" value="${st.distance||''}" oninput="updateStation(${i},'distance',this.value)" placeholder="e.g. 270"></div>
      <div><label style="font-size:12px;color:var(--text2)">Notes</label>
        <input value="${esc(st.notes||'')}" oninput="updateStation(${i},'notes',this.value)" placeholder="Optional notes"></div>
    </div>`;
  }
  if(st.type==='exercise'){
    const unitOpts=['reps','meters','seconds'];
    return `<div style="padding:12px 16px 16px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label style="font-size:12px;color:var(--text2)">Weight (kg)</label>
          <input inputmode="numeric" value="${st.weight||''}" oninput="updateStation(${i},'weight',this.value)" placeholder="e.g. 16"></div>
        <div style="flex:1"><label style="font-size:12px;color:var(--text2)">Amount</label>
          <input inputmode="numeric" value="${st.unit==='reps'?(st.reps||''):st.unit==='meters'?(st.distance||''):(st.time||'')}" oninput="updateStationAmount(${i},this.value)" placeholder="e.g. 10"></div>
      </div>
      <div style="display:flex;gap:6px">${unitOpts.map(u=>`<button onclick="updateStation(${i},'unit','${u}')" style="flex:1;height:36px;border-radius:10px;border:1px solid ${st.unit===u?'var(--neon)':'var(--border)'};background:${st.unit===u?'var(--neon)20':'none'};color:${st.unit===u?'var(--neon)':'var(--text2)'};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase">${u.toUpperCase()}</button>`).join('')}</div>
      <div><label style="font-size:12px;color:var(--text2)">Notes</label>
        <input value="${esc(st.notes||'')}" oninput="updateStation(${i},'notes',this.value)" placeholder="Optional notes"></div>
    </div>`;
  }
  if(st.type==='complex'){
    const cx=complexes.find(c=>c.id===st.complexId);
    const chain=cx?cx.movements.map(m=>{const e=exercises.find(x=>x.id===m.exerciseId);return `${m.reps}× ${e?.name||'?'}`;}).join(' → '):'';
    return `<div style="padding:12px 16px 16px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:10px">
      <div><label style="font-size:12px;color:var(--text2)">Rounds</label>
        <input inputmode="numeric" value="${st.reps||1}" oninput="updateStation(${i},'reps',this.value)" placeholder="e.g. 3"></div>
      ${chain?`<div style="font-size:12px;color:var(--text2);padding:8px;background:var(--surface2);border-radius:8px">${esc(chain)}</div>`:''}
      <div><label style="font-size:12px;color:var(--text2)">Notes</label>
        <input value="${esc(st.notes||'')}" oninput="updateStation(${i},'notes',this.value)" placeholder="Optional notes"></div>
    </div>`;
  }
  return '';
}

function toggleStation(i){
  S.wodBuilder.stations[i]._expanded=!S.wodBuilder.stations[i]._expanded;
  DB.all('exercises').then(exs=>DB.all('complexes').then(cxs=>renderStationList(exs,cxs)));
}
function updateStation(i,key,val){
  S.wodBuilder.stations[i][key]=val;
}
function updateStationAmount(i,val){
  const st=S.wodBuilder.stations[i];
  if(st.unit==='reps') st.reps=parseInt(val)||null;
  else if(st.unit==='meters') st.distance=parseInt(val)||null;
  else if(st.unit==='seconds') st.time=parseInt(val)||null;
}
function duplicateStation(i){
  const clone={...S.wodBuilder.stations[i],id:uid(),_expanded:false};
  S.wodBuilder.stations.splice(i+1,0,clone);
  DB.all('exercises').then(exs=>DB.all('complexes').then(cxs=>renderStationList(exs,cxs)));
}
function deleteStation(i){
  S.wodBuilder.stations.splice(i,1);
  DB.all('exercises').then(exs=>DB.all('complexes').then(cxs=>renderStationList(exs,cxs)));
}

// Drag-to-reorder
let dragSrcIdx=null;
function dragStart(i){ dragSrcIdx=i; }
function dragOver(e,i){ e.preventDefault(); }
function dragDrop(e,i){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===i) return;
  const arr=S.wodBuilder.stations;
  const [item]=arr.splice(dragSrcIdx,1);
  arr.splice(i,0,item);
  dragSrcIdx=null;
  DB.all('exercises').then(exs=>DB.all('complexes').then(cxs=>renderStationList(exs,cxs)));
}
function dragEnd(){ dragSrcIdx=null; }

async function beginCountdown(wod){
  const wb=S.wodBuilder;
  const stations=wb.stations.map(s=>{const{_expanded,...c}=s;return c;});
  if(!wod) wod={id:null,name:wb.name||`WOD · ${todayStr()}`,isPrebuilt:false,createdAt:Date.now(),stations};
  const exercises=await DB.all('exercises');
  const complexes=await DB.all('complexes');
  const dur=S.settings.countdownDuration||3;
  S.timer={active:false,paused:false,startMs:0,totalPausedMs:0,pauseStartMs:0,
    stationIdx:0,stationStartMs:0,laps:[],canUndo:false,undoBackup:null,
    wakeLock:null,rafId:null,sessionId:uid(),wod,stations,exercises,complexes};
  
  // Setup timer screen before countdown
  renderTimerScreen();
  showScreen('timer');
  
  const overlay=document.getElementById('countdown-overlay');
  const numEl=document.getElementById('countdown-num');
  overlay.classList.add('visible');
  let count=dur;
  function tick(){
    if(count>0){
      numEl.textContent=count;
      numEl.style.animation='none'; void numEl.offsetWidth; numEl.style.animation='countScale .1s ease';
      beep(440,0.1,0.4);
      count--;
      setTimeout(tick,1000);
    } else {
      numEl.textContent='GO!';
      numEl.style.animation='none'; void numEl.offsetWidth; numEl.style.animation='countScale .1s ease';
      beep(880,0.3,0.9);
      speak(getStationName(S.timer.stations[0],S.timer.exercises));
      setTimeout(()=>{
        overlay.classList.remove('visible');
        S.timer.active=true;
        S.timer.startMs=performance.now();
        S.timer.stationStartMs=performance.now();
        reqWakeLock();
        S.timer.rafId=requestAnimationFrame(timerTick);
        renderTimerScreen();
      },800);
    }
  }
  tick();
}

function getStationName(st,exercises){
  const ex=exercises?.find(e=>e.id===st?.exerciseId);
  return ex?.name||'Next station';
}

  const isLandscape=window.matchMedia('(orientation:landscape) and (min-width:768px)').matches;
  const isCardio=st?.type==='cardio'||st?.type==='exercise'&&exercises.find(e=>e.id===st.exerciseId)?.equipment==='cardio';
  const stLabel=st?stationLabel(st,exercises,complexes):'';
  const nextLabel=nextSt?stationLabel(nextSt,exercises,complexes):'';
  const exName=st?getStationName(st,exercises):'';
  const nStations=t.stations.length;

  // Progress indicator
  let progress='';
  if(nStations<=8){
    progress=`<div style="display:flex;gap:6px;align-items:center;justify-content:center">
      ${t.stations.map((_,i)=>{
        const done=i<t.stationIdx;
        const active=i===t.stationIdx;
        const next=i===t.stationIdx+1;
        let bg=done?'var(--neon)':active?'var(--orange)':next?'transparent':'#2a2a2e';
        let border=next?'1px solid var(--orange)':'none';

        return `<div style="width:9px;height:9px;border-radius:50%;background:${bg};border:${border};${extra};flex-shrink:0"></div>`;
      }).join('')}

  } else {
    const pct=t.stationIdx/Math.max(nStations-1,1)*100;
    progress=`<div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:3px;background:var(--surface2);border-radius:2px">
        <div style="height:100%;width:${pct}%;background:var(--neon);border-radius:2px;transition:width .3s"></div>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--text3);white-space:nowrap">${t.stationIdx+1} / ${nStations}</div>
    </div>`;
  }

  // Complex display
  let complexDetail='';
  if(st?.type==='complex'){
    const cx=complexes.find(c=>c.id===st.complexId);

  // Paused UI vs active controls
  let controls='';

      <button class="btn btn-danger" style="flex:0 0 auto;min-width:80px;height:56px" onclick="stopWorkout()">Stop</button>

        <div style="display:flex;align-items:center;gap:12px;padding:12px 0">

function timerTick(){
  const t=S.timer;
  if(!t.active||t.paused) return;
  const elapsed=(performance.now()-t.startMs-t.totalPausedMs)/1000;
  const el=document.getElementById('timer-display');
  if(el) el.textContent=fmtMM(elapsed);
  t.rafId=requestAnimationFrame(timerTick);
}

function getElapsedMs(){ return performance.now()-S.timer.startMs-S.timer.totalPausedMs; }

function pauseTimer(){
  const t=S.timer;
  if(!t.active||t.paused) return;
  t.paused=true; t.pauseStartMs=performance.now();
  cancelAnimationFrame(t.rafId);
  relWakeLock();
  renderTimerScreen();
  // Update pause counter
  const elMs=getElapsedMs();
  const el=document.getElementById('timer-display');
  if(el) el.textContent=fmtMM(elMs/1000);
  // Start pause counter tick
  pauseTick();
}

let pauseRafId=null;
function pauseTick(){
  const t=S.timer;
  if(!t.paused) return;
  const pausedSec=(performance.now()-t.pauseStartMs)/1000;
  const el=document.getElementById('pause-counter');
  if(el) el.textContent=`PAUSED · ${fmtMM(pausedSec)}`;
  pauseRafId=requestAnimationFrame(pauseTick);
}

function resumeTimer(){
  const t=S.timer;
  if(!t.active||!t.paused) return;
  t.totalPausedMs+=performance.now()-t.pauseStartMs;
  // Record pause lap
  const pauseDur=(performance.now()-t.pauseStartMs-0)/1000;
  t.laps.push({lapNumber:null,type:'pause',label:'Paused',duration:(performance.now()-t.pauseStartMs)/1000,startTime:t.pauseStartMs-t.startMs,endTime:performance.now()-t.startMs});
  t.paused=false;
  cancelAnimationFrame(pauseRafId);
  reqWakeLock();
  t.rafId=requestAnimationFrame(timerTick);
  renderTimerScreen();
}

function pressLap(){
  const t=S.timer;
  if(!t.active||t.paused) return;
  const nowMs=performance.now();
  const elapsedMs=getElapsedMs();
  const stDurMs=nowMs-t.stationStartMs-t.totalPausedMs;
  const stDurSec=Math.max(0,stDurMs)/1000;
  const st=t.stations[t.stationIdx];
  const lapNum=t.laps.filter(l=>l.type==='exercise').length+1;
  const lap={lapNumber:lapNum,type:'exercise',label:stationLabel(st,t.exercises,t.complexes),duration:stDurSec,startTime:t.stationStartMs-t.startMs,endTime:nowMs-t.startMs};
  t.undoBackup={lap,stationIdx:t.stationIdx,stationStartMs:t.stationStartMs};
  t.laps.push(lap);
  t.canUndo=true;
  // LAP pulse
  const btn=document.getElementById('lap-btn');
  if(btn){btn.style.animation='lapPulse .2s ease';setTimeout(()=>{if(btn)btn.style.animation='';},220);}
  beep(880,0.15,0.8);
  if(t.stationIdx>=t.stations.length-1){
    // Last station
    showModal(`<h2>Workout Complete!</h2><p style="color:var(--text2)">Great work! End this session?</p>
      <div class="modal-actions">
        <button class="btn btn-neon btn-full" onclick="endWorkout()">Yes, End Workout</button>
        <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
      </div>`);
  } else {
    t.stationIdx++;
    t.stationStartMs=performance.now();
    speak(getStationName(t.stations[t.stationIdx],t.exercises));
    renderTimerScreen();
    t.rafId=requestAnimationFrame(timerTick);
  }
}

function undoLap(){
  const t=S.timer;
  if(!t.canUndo||!t.undoBackup) return;
  t.laps.pop();
  t.stationIdx=t.undoBackup.stationIdx;
  t.stationStartMs=t.undoBackup.stationStartMs;
  t.canUndo=false; t.undoBackup=null;
  renderTimerScreen();
  t.rafId=requestAnimationFrame(timerTick);
}

async function finishAndSaveSession(){
  const t=S.timer;
  t.active=false;
  cancelAnimationFrame(t.rafId);
  relWakeLock();
  const endMs=performance.now();
  const totalDur=(endMs-t.startMs-t.totalPausedMs)/1000;
  const session={
    id:t.sessionId, wodId:t.wod?.id||null, wodName:t.wod?.name||'Untitled',
    startedAt:Date.now()-totalDur*1000, endedAt:Date.now(),
    totalDuration:Math.round(totalDur), laps:t.laps,
    journalPending:true, journal:null
  };
  await DB.put('sessions',session);
  S.summaryId=session.id;
}

function stopTimerCleanup(){
  const t=S.timer;
  t.active=false; t.paused=false;
  cancelAnimationFrame(t.rafId);
  cancelAnimationFrame(pauseRafId);
  relWakeLock();
}

  const wod=await DB.get('wods',id);

  if(isPrebuilt){
    const copy={...wod,id:uid(),name:`Copy of ${wod.name}`,isPrebuilt:false,createdAt:Date.now(),stations:wod.stations.map(s=>({...s,id:uid()}))};
    S.wodBuilder={stations:copy.stations.map(s=>({...s,_expanded:false})),name:copy.name,id:copy.id,isNew:true};
  } else {
    S.wodBuilder={stations:wod.stations.map(s=>({...s,_expanded:false})),name:wod.name,id:wod.id,isNew:false};
  }
  await nav('wod-builder');

async function copyMarkdown(sessionId){
  const session=await DB.get('sessions',sessionId);
  const rows=session.laps.map(l=>{
    if(l.type==='pause') return `| — | Paused | ${fmtMM(l.duration)} |`;
    return `| ${l.lapNumber} | ${l.label} | ${fmtMM(l.duration)} |`;
  }).join('\n');
  const md=`# ${session.wodName}\n**Date:** ${fmtDate(session.startedAt)}  \n**Total Time:** ${fmtFull(session.totalDuration)}\n\n| # | Station | Duration |\n|---|---------|----------|\n${rows}\n| **TOTAL** | | **${fmtFull(session.totalDuration)}** |`;
  try{ await navigator.clipboard.writeText(md); toast('Copied to clipboard'); }catch(e){ toast('Copy failed'); }
}

async function exportCSV(sessionId){
  const session=await DB.get('sessions',sessionId);
  const rows=session.laps.map(l=>l.type==='pause'?`-,Paused,${fmtMM(l.duration)}`:`${l.lapNumber},${l.label.replace(/,/g,' ')},${fmtMM(l.duration)}`).join('\n');
  const csv=`Lap,Station,Duration\n${rows}\nTOTAL,,${fmtFull(session.totalDuration)}`;
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${slug(session.wodName)}-${new Date(session.startedAt).toISOString().slice(0,10)}.csv`;
  a.click();
}

  session.journal={
    rpe:getSlider('rpe'), breathing:getSlider('breathing'), hydration:getSlider('hydration'),
    soreness:getSlider('soreness'), satisfaction:getSlider('satisfaction'), energy:getSlider('energy'),
    textWorkoutFeel:document.getElementById('j-feel')?.value||'',
    textSubstitutions:document.getElementById('j-subs')?.value||'',

    completedAt:Date.now()
  };
  session.journalPending=false;
  await DB.put('sessions',session);
  toast('Journal saved');
  await renderJournal(sessionId);
}

  applyTheme();
  await saveSettings();
  await renderSettings();
}
async function setCountdown(d){ S.settings.countdownDuration=d; await saveSettings(); await renderSettings(); }
async function setVoice(v){ S.settings.voiceMode=v; await saveSettings(); await renderSettings(); }
function applyTheme(){ document.body.classList.toggle('light-mode',!S.settings.darkMode); }
async function saveSettings(){ await DB.put('settings',{id:'user-settings',...S.settings}); }

function clearAllData(){
  showModal(`<h2>Clear All Data?</h2><p style="color:var(--text2)">Delete all your WODs, sessions, and journals?</p>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1" onclick="clearAllData2()">Delete All</button>
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
    </div>`);
}
function clearAllData2(){
  hideModal();
  showModal(`<h2>Are you sure?</h2><p style="color:var(--text2)">This cannot be undone. Everything will be deleted permanently.</p>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1" onclick="doNukeData()">Yes, Delete Everything</button>
      <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
    </div>`);
}
async function doNukeData(){
  hideModal();
  await Promise.all(['exercises','complexes','wods','sessions','settings'].map(s=>DB.clear(s)));
  await seedData();
  toast('All data cleared');
  nav('home');
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  await initDB();
  // Load settings first to avoid theme flash
  const saved=await DB.get('settings','user-settings');
  if(saved) Object.assign(S.settings,saved);
  applyTheme();
  await seedData();
  // Load voices
  if(window.speechSynthesis){ voices=speechSynthesis.getVoices(); if(!voices.length) speechSynthesis.onvoiceschanged=()=>{ voices=speechSynthesis.getVoices(); }; }
  await renderHome();
  showScreen('home');
  // Init AudioContext on first touch
  document.addEventListener('touchstart',()=>getACtx(),{once:true,passive:true});
  document.addEventListener('click',()=>getACtx(),{once:true});
}

init();
</script>
